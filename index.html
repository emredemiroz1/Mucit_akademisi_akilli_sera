<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Mucit Akademisi | Akıllı Sera</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f172a;
      color: white;
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }
    .glass-panel {
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .btn-touch { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
    .btn-touch:active:not(:disabled) { transform: scale(0.96); }
    
    @keyframes pulse-border {
      0% { border-color: rgba(239, 68, 68, 0.3); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.2); }
      50% { border-color: rgba(239, 68, 68, 0.8); box-shadow: 0 0 10px 0 rgba(239, 68, 68, 0.4); }
      100% { border-color: rgba(239, 68, 68, 0.3); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }
    .danger-pulse { animation: pulse-border 2s infinite; }
    .loader { width: 20px; height: 20px; border: 3px solid rgba(255, 255, 255, 0.3); border-bottom-color: #fff; border-radius: 50%; display: inline-block; animation: spin 1s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAR1cyO7pFPM5RLvO308uAcSyf5HaqAizM",
      authDomain: "akillisera-b71d4.firebaseapp.com",
      projectId: "akillisera-b71d4",
      storageBucket: "akillisera-b71d4.firebasestorage.app",
      messagingSenderId: "326483167364",
      appId: "1:326483167364:web:77623670ecad58db099ad1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.FB = { auth, db, doc, onSnapshot, setDoc, signInAnonymously, onAuthStateChanged };
    window.APP_ID = "master-iot-final-v3";
    window.firebaseReady = true;
  </script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useState, useRef } = React;

    function MetricCard({ title, value, unit, emoji, isDanger, isWarning }) {
      let colorClass = "border-white/5 bg-slate-800/50";
      if (isDanger) colorClass = "border-red-500/50 bg-red-500/10 text-red-100";
      else if (isWarning) colorClass = "border-amber-500/50 bg-amber-500/10 text-amber-100";
      else colorClass = "border-emerald-500/30 bg-emerald-500/10 text-emerald-50";

      return (
        <div className={`rounded-xl p-4 flex flex-col items-center justify-center border transition-colors ${colorClass}`}>
          <div className="text-3xl mb-2">{emoji}</div>
          <div className="text-[11px] font-bold uppercase tracking-widest opacity-70 mb-1">{title}</div>
          <div className="text-3xl font-black">{value}<span className="text-sm opacity-60 ml-1">{unit}</span></div>
        </div>
      );
    }

    function TargetAdjuster({ label, value, unit, onDecrease, onIncrease }) {
      return (
        <div className="flex flex-col items-center bg-slate-900/50 p-3 rounded-xl border border-white/5">
          <div className="text-[11px] text-slate-400 font-bold uppercase tracking-wider mb-3">{label}</div>
          <div className="flex items-center justify-between w-full gap-2">
            <button onClick={onDecrease} className="w-8 h-8 flex items-center justify-center bg-slate-700 rounded-lg text-lg font-bold btn-touch hover:bg-slate-600">-</button>
            <span className="text-lg font-black">{value}{unit}</span>
            <button onClick={onIncrease} className="w-8 h-8 flex items-center justify-center bg-slate-700 rounded-lg text-lg font-bold btn-touch hover:bg-slate-600">+</button>
          </div>
        </div>
      );
    }

    function SimpleToggle({ active, onClick, disabled, label, emoji, activeColorClass }) {
      return (
        <button onClick={onClick} disabled={disabled} className={`flex-1 p-4 rounded-xl border flex flex-col items-center gap-3 btn-touch ${disabled ? 'opacity-40 cursor-not-allowed' : ''} ${active ? `${activeColorClass} border-transparent` : "bg-slate-800 border-white/5 text-slate-400"}`}>
          <span className="text-4xl">{emoji}</span>
          <span className="text-[11px] font-bold uppercase tracking-widest text-white text-center">{label}</span>
        </button>
      );
    }

    function GreenhouseVisualizer({ left, right, nodes = Array(5).fill({t:24, h:50, s:50}) }) {
      const [showMap, setShowMap] = useState(false);

      const getHeatmapColor = (temp, alpha = 1) => {
        const boundedTemp = Math.max(10, Math.min(40, temp));
        const hue = ((40 - boundedTemp) / 30) * 240;
        return `hsla(${hue}, 100%, 50%, ${alpha})`;
      };

      const avgTemp = nodes.reduce((acc, curr) => acc + curr.t, 0) / 5;

      const heatmapStyle = {
        background: `
          radial-gradient(circle at 20% 25%, ${getHeatmapColor(nodes[0].t, 0.8)} 0%, transparent 40%),
          radial-gradient(circle at 20% 75%, ${getHeatmapColor(nodes[1].t, 0.8)} 0%, transparent 40%),
          radial-gradient(circle at 50% 50%, ${getHeatmapColor(nodes[2].t, 0.8)} 0%, transparent 50%),
          radial-gradient(circle at 80% 25%, ${getHeatmapColor(nodes[3].t, 0.8)} 0%, transparent 40%),
          radial-gradient(circle at 80% 75%, ${getHeatmapColor(nodes[4].t, 0.8)} 0%, transparent 40%)
        `,
        backgroundColor: getHeatmapColor(avgTemp, 0.3), 
        filter: 'blur(15px)', 
        opacity: showMap ? 0.75 : 0, 
        transition: 'opacity 1s ease-in-out'
      };

      const combinedSensors = [
        { key: 'SENSÖR 1', t: nodes[0].t.toFixed(1), h: nodes[0].h.toFixed(1), s: nodes[0].s.toFixed(1), top: '25%', left: '20%' },
        { key: 'SENSÖR 2', t: nodes[1].t.toFixed(1), h: nodes[1].h.toFixed(1), s: nodes[1].s.toFixed(1), top: '75%', left: '20%' },
        { key: 'SENSÖR 3', t: nodes[2].t.toFixed(1), h: nodes[2].h.toFixed(1), s: nodes[2].s.toFixed(1), top: '50%', left: '50%' },
        { key: 'SENSÖR 4', t: nodes[3].t.toFixed(1), h: nodes[3].h.toFixed(1), s: nodes[3].s.toFixed(1), top: '25%', left: '80%' },
        { key: 'SENSÖR 5', t: nodes[4].t.toFixed(1), h: nodes[4].h.toFixed(1), s: nodes[4].s.toFixed(1), top: '75%', left: '80%' }
      ];

      const ZoneVisual = ({ title, data, isMapActive }) => {
        const isHot = data.temp > data.targetTemp;
        const isCold = data.temp < data.targetTemp;
        const isDry = data.soil < data.targetSoil;

        let airBg = "bg-emerald-500/5 shadow-[inset_0_0_20px_rgba(16,185,129,0.05)]";
        if (isHot) airBg = "bg-red-500/20 shadow-[inset_0_0_30px_rgba(239,68,68,0.2)]";
        else if (isCold) airBg = "bg-sky-500/15 shadow-[inset_0_0_30px_rgba(56,189,248,0.2)]";

        let soilBg = "bg-emerald-900/30";
        if (isDry) soilBg = "bg-amber-900/50";
        else if (data.pump) soilBg = "bg-blue-900/50"; 

        if (isMapActive) {
          airBg = "bg-transparent";
          soilBg = "bg-transparent border-t border-white/5";
        }

        const iconOpacityClass = isMapActive ? "opacity-0 scale-50" : "opacity-90 scale-100";

        return (
          <div className="flex-1 relative flex flex-col h-full rounded-[24px] overflow-hidden border border-white/10 transition-all duration-700 z-10">
            <div className={`flex-1 flex flex-col items-center justify-center relative transition-colors duration-700 ${airBg}`}>
              <div className="absolute top-3 left-3 text-xs font-black text-white/50">{title}</div>
              <div className={`text-6xl transition-all duration-500 ${data.fan && !isMapActive ? 'animate-spin text-cyan-400' : ''} ${iconOpacityClass}`}>
                {data.fan ? '🌀' : isHot ? '🔥' : isCold ? '☀️' : '✅'}
              </div>
              <div className={`text-[10px] font-bold mt-3 tracking-widest uppercase text-center transition-all duration-500 ${iconOpacityClass}`}>
                {data.fan ? 'Soğutuluyor/Tahliye' : isHot ? 'Sıcak' : isCold ? 'Doğal Isınma' : 'İdeal Hava'}
              </div>
            </div>
            
            <div className={`h-1/3 relative flex flex-col items-center justify-center transition-colors duration-700 ${soilBg} ${isMapActive ? 'border-t border-white/5' : 'border-t border-white/10'}`}>
              <div className={`absolute -top-5 text-3xl transition-all duration-300 ${data.pump && !isMapActive ? 'text-blue-400 animate-bounce opacity-100' : 'opacity-0'}`}>💧</div>
              <div className={`text-5xl transition-all duration-500 ${iconOpacityClass}`}>
                {isDry ? '🏜️' : data.pump ? '🌧️' : '🪴'}
              </div>
              <div className={`text-[10px] font-bold mt-2 tracking-widest uppercase transition-all duration-500 ${iconOpacityClass}`}>
                {isDry ? 'Toprak Kuru' : data.pump ? 'Sulanıyor/Nem' : 'Toprak Nemli'}
              </div>
            </div>
          </div>
        );
      };

      return (
        <div className="mb-10 w-full max-w-[700px] mx-auto animate-[fadeIn_0.5s_ease-out]">
          
          <div className="flex justify-between items-center mb-3 px-2">
            <div className="text-xs font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2">
              <span>👁️</span> 2.5D Dijital Sera İkizi
            </div>
            <button 
              onClick={() => setShowMap(!showMap)}
              className={`px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-widest transition-all border btn-touch flex items-center gap-2 ${showMap ? 'bg-orange-600 border-orange-500 text-white shadow-[0_0_15px_rgba(249,115,22,0.4)]' : 'bg-slate-800 border-white/10 text-slate-300 hover:bg-slate-700'}`}
            >
              <span>{showMap ? 'Haritayı Gizle' : '🔍 Termal Harita'}</span>
            </button>
          </div>

          <div className="w-full aspect-[4/3] bg-slate-900/90 rounded-[32px] border-4 border-slate-800 p-3 shadow-[0_0_40px_rgba(0,0,0,0.4)] flex flex-col relative overflow-hidden">
             
             <div className="h-[15%] w-full relative overflow-hidden flex items-end justify-center pb-3 z-20">
               <div className="absolute inset-x-6 top-3 bottom-0 bg-gradient-to-t from-white/5 to-transparent rounded-t-[100px] border border-b-0 border-white/10"></div>
               <div className="w-20 h-1.5 bg-yellow-500/40 rounded-full shadow-[0_0_20px_rgba(234,179,8,0.6)]"></div>
             </div>
             
             <div className="flex-1 flex gap-3 pt-3 pb-2 px-2 relative">
               <div className="absolute inset-0 rounded-2xl z-0" style={heatmapStyle}></div>

               <ZoneVisual title="SOL BÖLGE" data={left} isMapActive={showMap} />
               <div className="absolute top-3 bottom-2 left-1/2 -translate-x-1/2 w-2 bg-slate-800 rounded-full border border-white/5 z-10 shadow-lg"></div>
               <ZoneVisual title="SAĞ BÖLGE" data={right} isMapActive={showMap} />
               
               <div className={`absolute inset-0 z-20 pointer-events-none transition-all duration-500 ${showMap ? 'opacity-100 scale-100' : 'opacity-0 scale-95'}`}>
                 {combinedSensors.map((sensor) => (
                    <div key={sensor.key} className="absolute transform -translate-x-1/2 -translate-y-1/2 bg-slate-900/90 backdrop-blur-md border border-white/10 rounded-xl px-3 py-2 shadow-2xl flex flex-col items-center min-w-[110px]" style={{ top: sensor.top, left: sensor.left }}>
                      <div className="text-[10px] text-amber-400 font-black tracking-widest border-b border-white/10 w-full text-center pb-1 mb-1.5">{sensor.key}</div>
                      <div className="flex w-full justify-between items-center gap-3 text-[11px] font-black text-white">
                        <div className="flex flex-col items-center"><span className="text-cyan-400 text-[7px] mb-0.5">ISI</span>{sensor.t}°C</div>
                        <div className="flex flex-col items-center"><span className="text-blue-400 text-[7px] mb-0.5">H.NEM</span>%{sensor.h}</div>
                        <div className="flex flex-col items-center"><span className="text-red-400 text-[7px] mb-0.5">TOPRAK</span>%{sensor.s}</div>
                      </div>
                    </div>
                 ))}
               </div>
             </div>
          </div>
        </div>
      );
    }

    function ZoneCard({ zoneKey, title, data, onUpdate, autoMode, waterLow }) {
      const { temp, hum, soil, targetTemp, targetHum, targetSoil, pump, fan, scheduledTime, scheduleActive } = data;

      const isTempHigh = temp > targetTemp;
      const isTempLow = temp < targetTemp;
      const isHumHigh = hum > targetHum;
      const isHumLow = hum < targetHum;
      const isSoilDry = soil < targetSoil - 1; 
      const isSoilWet = soil > targetSoil + 1; 

      const now = new Date();
      const currentHH = now.getHours();
      const currentMM = now.getMinutes();
      const currentHHMM = `${String(currentHH).padStart(2, '0')}:${String(currentMM).padStart(2, '0')}`;
      
      let hrsLeft = 0;
      let minsLeft = 0;
      let diffMins = -1;

      if (scheduleActive && scheduledTime) {
        const [schedHH, schedMM] = scheduledTime.split(':').map(Number);
        diffMins = (schedHH * 60 + schedMM) - (currentHH * 60 + currentMM);
        
        if (diffMins < 0) { diffMins += 24 * 60; }
        
        if (diffMins > 0) {
            hrsLeft = Math.floor(diffMins / 60);
            minsLeft = diffMins % 60;
        }
      }

      const isScheduledNow = scheduleActive && diffMins === 0;

      let statusMessages = [];

      if (isScheduledNow && !waterLow) {
         if (pump) {
            statusMessages.push(<div key="sch" className="text-indigo-400 flex items-center gap-2"><span className="animate-pulse text-xl">⏰</span> Zamanlanmış Sulama Yapılıyor...</div>);
         } else {
            statusMessages.push(<div key="sch_ok" className="text-emerald-400 flex items-center gap-2"><span className="text-xl">✅</span> Zamanlanmış Sulama Tamamlandı.</div>);
         }
      }

      if (autoMode) {
        if (isTempHigh) statusMessages.push(<div key="t" className="text-cyan-400 flex items-center gap-2"><span className="animate-spin">🌀</span> Sıcaklık Yüksek! Fan Devrede.</div>);
        else if (isTempLow) statusMessages.push(<div key="tl" className="text-amber-400 flex items-center gap-2"><span>☀️</span> Sıcaklık Düşük. Doğal Isınma Bekleniyor.</div>);
        
        if (isHumHigh) statusMessages.push(<div key="h" className="text-cyan-400 flex items-center gap-2"><span className="animate-spin">🌀</span> Nem Yüksek! Tahliye Yapılıyor.</div>);
        else if (isHumLow) {
          if (!waterLow) statusMessages.push(<div key="hl" className="text-blue-400 flex items-center gap-2"><span className="animate-bounce">💧</span> Nem Düşük! Pompa (Nemlendirme) Aktif.</div>);
          else statusMessages.push(<div key="hlw" className="text-red-400 flex items-center gap-2"><span>⚠️</span> Nem Düşük! SU DEPOSU BOŞ!</div>);
        }
        
        if (pump && !isHumLow && !waterLow && !isScheduledNow) statusMessages.push(<div key="s" className="text-blue-400 flex items-center gap-2"><span className="animate-bounce">💧</span> Sulama Yapılıyor (Hedef: %{targetSoil + 1})...</div>);
        else if (isSoilDry && waterLow) statusMessages.push(<div key="sw" className="text-red-400 flex items-center gap-2"><span>⚠️</span> Toprak Kuru! Ancak SU DEPOSU BOŞ!</div>);
        
        if (!isTempHigh && !isTempLow && !isHumHigh && !isHumLow && !isSoilDry && !pump && !isScheduledNow) {
          statusMessages.push(<div key="ok" className="text-emerald-400 flex items-center gap-2"><span>✅</span> Ortam Değerleri İdeal Seviyede.</div>);
        }
      } else {
        if (pump && !isScheduledNow) statusMessages.push(<div key="mp" className="text-blue-400 flex items-center gap-2">💧 Manuel Sulama/Nemlendirme Aktif...</div>);
        if (fan) statusMessages.push(<div key="mf" className="text-cyan-400 flex items-center gap-2"><span className="animate-spin">🌀</span> Manuel Fan Aktif...</div>);
        if (!pump && !fan && !isScheduledNow) statusMessages.push(<div key="mn" className="text-slate-400 flex items-center gap-2">🔧 Sistem Manuel Beklemede.</div>);
      }

      return (
        <div className="glass-panel rounded-[24px] p-6 border border-white/10 shadow-xl relative overflow-hidden flex flex-col h-full">
          <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 to-emerald-500"></div>
          <h2 className="text-2xl font-black text-white mb-6 tracking-tight flex items-center gap-2"><span>📍</span> {title}</h2>
          <div className="grid grid-cols-3 gap-3 mb-6">
            <MetricCard title="Sıcaklık" value={temp} unit="°C" emoji="🌡️" isDanger={isTempHigh} isWarning={isTempLow} />
            <MetricCard title="Hava Nem" value={hum} unit="%" emoji="☁️" isDanger={isHumHigh} isWarning={isHumLow} />
            <MetricCard title="Toprak" value={soil} unit="%" emoji="🪴" isDanger={isSoilDry} isWarning={isSoilWet} />
          </div>
          <div className="bg-slate-900/60 rounded-xl p-5 mb-5 border border-white/5 text-sm font-medium space-y-3">{statusMessages}</div>
          <div className="border-t border-white/5 pt-5 mt-auto">
            <h3 className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4 flex justify-between">
              <span>{autoMode ? "🎯 Hedef Ayarları" : "🔧 Manuel Kontroller & Hedefler"}</span>
              {autoMode && <span className="text-indigo-400">Otonom Devrede</span>}
            </h3>
            {!autoMode && (
              <div className="flex gap-4 mb-5">
                <SimpleToggle label={zoneKey === 'left' ? "Sol Su Motoru" : "Sağ Su Motoru"} emoji="🚰" active={pump} disabled={waterLow} onClick={() => onUpdate(`${zoneKey}_pump`, !pump)} activeColorClass="bg-blue-600 text-white" />
                <SimpleToggle label={zoneKey === 'left' ? "Sol Fan" : "Sağ Fan"} emoji="🌀" active={fan} onClick={() => onUpdate(`${zoneKey}_fan`, !fan)} activeColorClass="bg-cyan-600 text-white" />
              </div>
            )}
            <div className="grid grid-cols-3 gap-3">
               <TargetAdjuster label="Hedef Isı" value={targetTemp} unit="°C" onDecrease={() => onUpdate(`${zoneKey}_targetTemp`, Math.max(15, targetTemp - 1))} onIncrease={() => onUpdate(`${zoneKey}_targetTemp`, Math.min(40, targetTemp + 1))} />
               <TargetAdjuster label="Hedef Nem" value={targetHum} unit="%" onDecrease={() => onUpdate(`${zoneKey}_targetHum`, Math.max(30, targetHum - 5))} onIncrease={() => onUpdate(`${zoneKey}_targetHum`, Math.min(90, targetHum + 5))} />
               <TargetAdjuster label="İdeal Toprak" value={`${targetSoil - 1}-${targetSoil + 1}`} unit="%" onDecrease={() => onUpdate(`${zoneKey}_targetSoil`, Math.max(20, targetSoil - 1))} onIncrease={() => onUpdate(`${zoneKey}_targetSoil`, Math.min(90, targetSoil + 1))} />
            </div>

            <div className="mt-4 flex items-center justify-between bg-slate-900/60 p-4 rounded-xl border border-white/5">
              <div className="flex items-center gap-4">
                <div className="text-3xl drop-shadow-[0_0_10px_rgba(79,70,229,0.5)]">⏰</div>
                <div className="flex flex-col gap-1.5">
                  <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2">
                    Zamanlı Sulama
                    {scheduleActive && <span className="text-emerald-400 animate-pulse text-[9px] bg-emerald-500/20 px-1.5 rounded">(Aktif)</span>}
                  </div>
                  <div className="flex items-center gap-3">
                    <input 
                      type="time" 
                      value={scheduledTime || "12:00"} 
                      onChange={(e) => onUpdate(`${zoneKey}_scheduledTime`, e.target.value)}
                      className="bg-slate-800 text-white text-sm font-black px-2 py-1 rounded-lg border border-white/10 outline-none focus:border-indigo-500 [color-scheme:dark]"
                    />
                    
                    {scheduleActive && diffMins > 0 && (
                      <div className="text-[10px] font-bold text-indigo-300 bg-indigo-500/10 px-2 py-1 rounded border border-indigo-500/20">
                        ⏳ {hrsLeft > 0 ? `${hrsLeft} saat ` : ''}{minsLeft} dk kaldı
                      </div>
                    )}
                    {scheduleActive && diffMins === 0 && pump && (
                      <div className="text-[10px] font-bold text-emerald-400 bg-emerald-500/10 px-2 py-1 rounded border border-emerald-500/20">
                        💦 Sulama yapılıyor
                      </div>
                    )}
                  </div>
                </div>
              </div>
              
              <button 
                onClick={() => onUpdate(`${zoneKey}_scheduleActive`, !scheduleActive)}
                className={`px-5 py-3 rounded-xl text-xs font-black uppercase tracking-widest transition-all border ${scheduleActive ? 'bg-indigo-600 border-indigo-500 text-white shadow-[0_0_15px_rgba(79,70,229,0.4)]' : 'bg-slate-800 border-white/10 text-slate-400 hover:bg-slate-700'}`}
              >
                {scheduleActive ? 'KAPAT' : 'AÇ'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [ready, setReady] = useState(false);
      const [user, setUser] = useState(null);
      const [pin, setPin] = useState("");
      const [loggedIn, setLoggedIn] = useState(false);
      const [errorMsg, setErrorMsg] = useState("");

      const [sera, setSera] = useState({ 
        auto: false, 
        waterLevel: 0, 
        left: { temp: 0, hum: 0, soil: 0, pump: false, fan: false, targetTemp: 25, targetHum: 50, targetSoil: 50, scheduledTime: "08:00", scheduleActive: false }, 
        right: { temp: 0, hum: 0, soil: 0, pump: false, fan: false, targetTemp: 25, targetHum: 50, targetSoil: 50, scheduledTime: "19:00", scheduleActive: false },
        nodes: Array(5).fill({t: 0, h: 0, s: 0})
      });

      const seraRef = useRef(sera);
      useEffect(() => { seraRef.current = sera; }, [sera]);

      useEffect(() => {
        const t = setInterval(() => { if (window.firebaseReady && window.FB) { setReady(true); clearInterval(t); } }, 100);
        return () => clearInterval(t);
      }, []);

      useEffect(() => {
        if (!ready) return;
        window.FB.signInAnonymously(window.FB.auth).catch(e => setErrorMsg("Bağlantı hatası!"));
        const unsub = window.FB.onAuthStateChanged(window.FB.auth, setUser);
        return () => unsub && unsub();
      }, [ready]);

      useEffect(() => {
        if (!user) return;
        const ref = window.FB.doc(window.FB.db, "artifacts", window.APP_ID, "public", "data", "greenhouse", "status");
        const unsubSera = window.FB.onSnapshot(ref, (snap) => {
            if (snap.exists()) {
              const d = snap.data();
              const gv = (key, fallback) => {
                if (d[key] !== undefined) return d[key];
                if (d.fields && d.fields[key]) {
                  let f = d.fields[key];
                  return f.integerValue !== undefined ? Number(f.integerValue) : f.doubleValue !== undefined ? Number(f.doubleValue) : f.booleanValue !== undefined ? f.booleanValue : f.stringValue !== undefined ? f.stringValue : fallback;
                }
                return fallback;
              };

              const parseZone = (prefix) => {
                return {
                  temp: gv(`${prefix}_temp`, 0), 
                  hum: gv(`${prefix}_hum`, 0), 
                  soil: gv(`${prefix}_soil`, 0),
                  pump: gv(`${prefix}_pump`, false), 
                  fan: gv(`${prefix}_fan`, false),
                  targetTemp: gv(`${prefix}_targetTemp`, 25), 
                  targetHum: gv(`${prefix}_targetHum`, 50), 
                  targetSoil: gv(`${prefix}_targetSoil`, 50),
                  scheduledTime: gv(`${prefix}_scheduledTime`, "12:00"),
                  scheduleActive: gv(`${prefix}_scheduleActive`, false)
                };
              };

              const leftZone = parseZone("left");
              const rightZone = parseZone("right");

              // GÜÇLENDİRİLMİŞ FALLBACK (YEDEKLEME) ALGORİTMASI
              // Eğer sensörler 0 gönderiyorsa veya henüz karta bağlanmamışsa alt kartlardaki değerleri (Sol/Sağ) gösterir.
              const parseNodes = () => {
                const getVal = (key, fallback) => {
                   let val = gv(key, null);
                   return (val === null || val === 0) ? fallback : val;
                };
                return [
                  { t: getVal(`s1_t`, leftZone.temp), h: getVal(`s1_h`, leftZone.hum), s: getVal(`s1_s`, leftZone.soil) },
                  { t: getVal(`s2_t`, leftZone.temp), h: getVal(`s2_h`, leftZone.hum), s: getVal(`s2_s`, leftZone.soil) },
                  { t: getVal(`s3_t`, (leftZone.temp + rightZone.temp)/2), h: getVal(`s3_h`, (leftZone.hum + rightZone.hum)/2), s: getVal(`s3_s`, (leftZone.soil + rightZone.soil)/2) },
                  { t: getVal(`s4_t`, rightZone.temp), h: getVal(`s4_h`, rightZone.hum), s: getVal(`s4_s`, rightZone.soil) },
                  { t: getVal(`s5_t`, rightZone.temp), h: getVal(`s5_h`, rightZone.hum), s: getVal(`s5_s`, rightZone.soil) }
                ];
              };

              setSera({ 
                auto: gv("auto", false), 
                waterLevel: gv("waterLevel", 0), 
                left: leftZone, 
                right: rightZone,
                nodes: parseNodes()
              });
            }
        });
        return () => unsubSera();
      }, [user]);

      const updateSeraFlat = async (field, value) => {
        if (!user) return;
        const ref = window.FB.doc(window.FB.db, "artifacts", window.APP_ID, "public", "data", "greenhouse", "status");
        await window.FB.setDoc(ref, { [field]: value }, { merge: true }).catch(console.error);
      };

      // CANLI OTONOM KARAR MOTORU
      useEffect(() => {
        if (!user) return;
        const controlInterval = setInterval(() => {
          const current = seraRef.current;
          let changedData = {};
          const waterLow = current.waterLevel < 15;

          const now = new Date();
          const currentHHMM = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

          ['left', 'right'].forEach(zKey => {
            const z = current[zKey];
            
            if (!current.auto && !z.scheduleActive) return;

            let { temp: t, hum: h, soil: s, pump, fan, targetTemp, targetHum, targetSoil, scheduledTime, scheduleActive } = z;
            let initialPump = z.pump;
            let initialFan = z.fan;

            if (current.auto) {
              if (t > targetTemp || h > targetHum) fan = true;
              else if (t <= targetTemp && h <= targetHum) fan = false;
              
              if (s < targetSoil - 1 || h < targetHum) pump = true;
              else if (s >= targetSoil + 1 && h >= targetHum) pump = false;
            }

            if (scheduleActive && scheduledTime === currentHHMM) {
               if (s < targetSoil + 1) pump = true; 
               else pump = false; 
            }

            if (waterLow && pump) pump = false;

            if (pump !== initialPump) changedData[`${zKey}_pump`] = pump;
            if (fan !== initialFan) changedData[`${zKey}_fan`] = fan;
          });
          
          if (Object.keys(changedData).length > 0) {
            const ref = window.FB.doc(window.FB.db, "artifacts", window.APP_ID, "public", "data", "greenhouse", "status");
            window.FB.setDoc(ref, changedData, { merge: true }).catch(console.error);
          }
        }, 3000); 
        return () => clearInterval(controlInterval);
      }, [user]);

      function login() {
        if (pin === "1111") {
          setLoggedIn(true);
          setErrorMsg("");
        } else {
          setErrorMsg("Hatalı PIN! Lütfen tekrar deneyin.");
        }
      }

      if (!ready) return <div className="min-h-screen flex items-center justify-center px-6"><span className="loader"></span></div>;

      if (!loggedIn) {
        return (
          <div className="min-h-screen flex items-center justify-center px-6 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] bg-slate-50">
            <div className="bg-white w-full max-w-sm rounded-3xl p-8 shadow-2xl relative overflow-hidden border border-slate-200">
              <div className="absolute top-0 left-0 w-full h-2 bg-blue-600"></div>
              <div className="text-center mb-8 mt-4 flex flex-col items-center">
                <div className="mb-3 flex justify-center w-full"><img src="mucitlogo.png" alt="Logo" className="h-32 object-contain" /></div>
                <h1 className="text-center text-4xl font-black tracking-tighter text-slate-900 leading-[1.1]">MUCİT<br/><span className="text-blue-600">AKADEMİSİ</span></h1>
              </div>
              <input type="password" maxLength="4" value={pin} onChange={(e) => setPin(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && login()} placeholder="GÜVENLİK KODU" className="w-full rounded-xl bg-slate-50 border border-slate-200 px-5 py-4 text-center text-xl tracking-[0.2em] text-slate-900 outline-none focus:border-blue-500 mb-4 font-bold" />
              <button onClick={login} className="w-full rounded-xl bg-blue-600 hover:bg-blue-700 text-white py-4 font-bold uppercase tracking-wider btn-touch shadow-lg shadow-blue-600/20">Giriş Yap</button>
              {errorMsg && <div className="mt-4 p-3 rounded-lg bg-red-50 text-red-500 text-center text-sm font-bold">{errorMsg}</div>}
            </div>
          </div>
        );
      }

      const waterLow = sera.waterLevel < 15;

      return (
        <div className="min-h-screen pb-12">
          <header className="px-6 py-5 glass-panel sticky top-0 z-50 flex items-center justify-between shadow-lg">
            <div className="flex items-center gap-4">
              <div className="w-12 h-12 rounded-xl bg-emerald-600 flex items-center justify-center text-2xl shadow-lg">🌱</div>
              <div>
                <div className="text-xl font-black tracking-tight text-white">AKILLI SERA</div>
                <div className="text-xs font-bold text-slate-400 uppercase tracking-widest flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-green-500"></span> CANLI SİSTEM DEVREDE</div>
              </div>
            </div>
            <button onClick={() => { setLoggedIn(false); setPin(""); }} className="px-5 py-2.5 rounded-xl bg-white/5 border border-white/10 text-sm font-bold btn-touch hover:bg-white/10">ÇIKIŞ</button>
          </header>

          <main className="max-w-6xl mx-auto px-4 py-8 animate-[fadeIn_0.3s_ease-out]">
            
            <GreenhouseVisualizer left={sera.left} right={sera.right} nodes={sera.nodes} />

            <div className="max-w-xl mx-auto mb-8 space-y-4">
              <div className={`glass-panel rounded-2xl p-5 flex flex-col gap-3 ${waterLow ? 'danger-pulse' : 'border border-white/5'}`}>
                <div className="flex justify-between items-center text-sm font-bold uppercase tracking-widest">
                  <span className="text-blue-300 flex items-center gap-2">🌊 Ana Su Deposu</span>
                  <span className={waterLow ? 'text-red-400' : 'text-emerald-400'}>%{Math.round(sera.waterLevel)}</span>
                </div>
                <div className="w-full bg-slate-900 rounded-full h-4 overflow-hidden border border-white/5">
                  <div className={`h-full transition-all duration-1000 ${waterLow ? 'bg-red-500' : (sera.waterLevel < 45 ? 'bg-amber-500' : 'bg-blue-500')}`} style={{ width: `${sera.waterLevel}%` }}></div>
                </div>
                {waterLow && <div className="text-xs text-red-400 font-bold mt-1 text-center bg-red-500/10 p-3 rounded-lg">⚠️ KRİTİK SEVİYE! POMPALAR DURDURULDU. LÜTFEN DEPOYU DOLDURUN.</div>}
                {(!waterLow && sera.waterLevel < 45) && <div className="text-xs text-amber-400 font-bold mt-1 text-center bg-amber-500/10 p-3 rounded-lg">⚠️ UYARI: Su Seviyesi Yarıdan Aşağı Düştü!</div>}
              </div>

              <button onClick={() => updateSeraFlat("auto", !sera.auto)} className={`w-full rounded-2xl p-5 flex items-center justify-between border btn-touch transition-all shadow-lg ${sera.auto ? "bg-gradient-to-r from-indigo-600 to-purple-600 border-indigo-400/50" : "bg-slate-800/80 border-white/10 text-slate-300"}`}>
                <div className="flex items-center gap-4">
                  <div className="text-4xl">🤖</div>
                  <div className="text-left">
                    <div className="text-lg font-black uppercase tracking-wider text-white">Otonom Sistem</div>
                    <div className="text-xs text-white/70">{sera.auto ? "Yapay Zeka Devrede" : "Sistem Manuel Kontrolde"}</div>
                  </div>
                </div>
                <div className={`w-16 h-8 rounded-full p-1.5 transition-all ${sera.auto ? "bg-white/30" : "bg-slate-900"}`}>
                  <div className={`w-5 h-5 bg-white rounded-full transition-all ${sera.auto ? "translate-x-8" : "translate-x-0"}`}></div>
                </div>
              </button>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 mt-10">
              <ZoneCard zoneKey="left" title="Sol Bölge Detayları" data={sera.left} onUpdate={updateSeraFlat} autoMode={sera.auto} waterLow={waterLow} />
              <ZoneCard zoneKey="right" title="Sağ Bölge Detayları" data={sera.right} onUpdate={updateSeraFlat} autoMode={sera.auto} waterLow={waterLow} />
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body> 
</html>
