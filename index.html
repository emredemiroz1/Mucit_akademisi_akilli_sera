<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Mucit Akademisi | Akıllı Ev</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f172a;
      color: white;
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }
    .glass-panel {
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .btn-touch {
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }
    .btn-touch:active:not(:disabled) {
      transform: scale(0.96);
    }
    .loader {
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-bottom-color: #fff;
      border-radius: 50%;
      display: inline-block;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAR1cyO7pFPM5RLvO308uAcSyf5HaqAizM",
      authDomain: "akillisera-b71d4.firebaseapp.com",
      projectId: "akillisera-b71d4",
      storageBucket: "akillisera-b71d4.firebasestorage.app",
      messagingSenderId: "326483167364",
      appId: "1:326483167364:web:77623670ecad58db099ad1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.FB = { auth, db, doc, onSnapshot, setDoc, signInAnonymously, onAuthStateChanged };
    window.APP_ID = "master-iot-final-v3";
    window.firebaseReady = true;
  </script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useState } = React;

    function MetricCard({ title, value, unit, emoji, isDanger, isWarning }) {
      let colorClass = "border-white/5 bg-slate-800/50";
      if (isDanger) colorClass = "border-red-500/50 bg-red-500/10 text-red-100";
      else if (isWarning) colorClass = "border-amber-500/50 bg-amber-500/10 text-amber-100";

      return (
        <div className={`rounded-xl p-3 flex flex-col items-center justify-center border transition-colors ${colorClass}`}>
          <div className="text-xl mb-1">{emoji}</div>
          <div className="text-[9px] font-bold uppercase tracking-widest opacity-70 mb-1">{title}</div>
          <div className="text-xl font-black">{value}<span className="text-xs opacity-60 ml-1">{unit}</span></div>
        </div>
      );
    }

    function ModernWidget({ title, subtitle, icon, active, onClick, colorClass }) {
      return (
        <button onClick={onClick} className={`relative overflow-hidden p-4 rounded-[20px] border text-left btn-touch transition-all duration-300 ${active ? colorClass : 'bg-slate-800/50 border-white/5 text-slate-400'}`}>
          <div className="flex justify-between items-start mb-4">
             <div className={`text-3xl transition-transform duration-300 ${active ? 'scale-110' : 'grayscale opacity-50'}`}>{icon}</div>
             <div className={`w-10 h-6 rounded-full p-1 transition-all ${active ? 'bg-white/30' : 'bg-slate-700'}`}>
                <div className={`w-4 h-4 bg-white rounded-full transition-all shadow-sm ${active ? 'translate-x-4' : 'translate-x-0'}`}></div>
             </div>
          </div>
          <div className={`font-bold text-sm tracking-wide ${active ? 'text-white' : 'text-slate-300'}`}>{title}</div>
          <div className="text-[9px] uppercase tracking-widest opacity-70 mt-1">{subtitle}</div>
        </button>
      );
    }

    function HomeVisualizer({ data }) {
      return (
        <div className="mb-8 w-full max-w-[380px] mx-auto animate-[fadeIn_0.5s_ease-out]">
          <div className="text-center mb-2 text-[10px] font-bold text-slate-400 uppercase tracking-widest flex items-center justify-center gap-2">
            <span>👁️</span> Dijital Ev İkizi
          </div>
          <div className="w-full bg-slate-900/90 rounded-[32px] border-4 border-slate-800 p-4 shadow-[0_0_40px_rgba(0,0,0,0.4)] flex flex-col relative overflow-hidden h-[240px]">
            <div className="w-0 h-0 border-l-[160px] border-r-[160px] border-b-[60px] border-l-transparent border-r-transparent border-b-slate-800 mx-auto relative mb-2"></div>
            <div className="flex-1 bg-slate-800 rounded-lg flex flex-col border border-white/5 relative">
              <div className="flex-1 flex border-b border-white/5">
                <div className={`flex-1 border-r border-white/5 flex items-center justify-center transition-colors duration-500 ${data.light ? 'bg-amber-500/10' : 'bg-transparent'}`}>
                  <div className={`text-4xl transition-all duration-500 ${data.light ? 'drop-shadow-[0_0_15px_#fbbf24] scale-110' : 'opacity-30 grayscale'}`}>💡</div>
                </div>
                <div className={`flex-1 flex items-center justify-center gap-4 transition-colors duration-500 ${data.kitchen ? 'bg-blue-500/10' : 'bg-transparent'}`}>
                  <div className={`text-3xl transition-all duration-500 ${data.kitchen ? 'drop-shadow-[0_0_15px_#60a5fa] scale-110' : 'opacity-30 grayscale'}`}>🍽️</div>
                  <div className={`text-3xl transition-all duration-500 relative ${data.coffee ? 'drop-shadow-[0_0_15px_#f97316] scale-110' : 'opacity-30 grayscale'}`}>
                    ☕{data.coffee && <div className="absolute -top-4 left-2 text-sm animate-bounce">♨️</div>}
                  </div>
                </div>
              </div>
              <div className="flex-1 flex">
                 <div className={`flex-1 flex items-center justify-center gap-4 border-r border-white/5 transition-colors duration-500 ${data.heater && data.fan ? 'bg-purple-500/10' : data.heater ? 'bg-red-500/10' : data.fan ? 'bg-cyan-500/10' : 'bg-transparent'}`}>
                    <div className={`text-3xl transition-all duration-500 ${data.heater ? 'drop-shadow-[0_0_15px_#ef4444] scale-110 animate-pulse' : 'opacity-30 grayscale'}`}>🔥</div>
                    <div className={`text-3xl transition-all duration-500 ${data.fan ? 'drop-shadow-[0_0_15px_#06b6d4] animate-spin' : 'opacity-30 grayscale'}`}>🌀</div>
                 </div>
                 <div className={`flex-1 flex items-center justify-center transition-colors duration-500 ${data.plug ? 'bg-emerald-500/10' : 'bg-transparent'}`}>
                    <div className="flex flex-col items-center gap-1">
                      <div className={`text-4xl transition-all duration-500 ${data.plug ? 'drop-shadow-[0_0_15px_#10b981] scale-110' : 'opacity-30 grayscale'}`}>📺</div>
                      <div className={`text-[10px] transition-all duration-500 font-bold ${data.plug ? 'text-emerald-400' : 'text-slate-600 opacity-30'}`}>🔌 Aktif</div>
                    </div>
                 </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [ready, setReady] = useState(false);
      const [user, setUser] = useState(null);
      const [pin, setPin] = useState("");
      const [loggedIn, setLoggedIn] = useState(false);
      const [errorMsg, setErrorMsg] = useState("");

      const [homeData, setHomeData] = useState({ light: false, kitchen: false, coffee: false, heater: false, fan: false, plug: false });
      const [homeSim, setHomeSim] = useState({ power: 120, temp: 23.5 }); 

      useEffect(() => {
        const t = setInterval(() => { if (window.firebaseReady && window.FB) { setReady(true); clearInterval(t); } }, 100);
        return () => clearInterval(t);
      }, []);

      useEffect(() => {
        if (!ready) return;
        window.FB.signInAnonymously(window.FB.auth).catch(e => setErrorMsg("Bağlantı hatası!"));
        const unsub = window.FB.onAuthStateChanged(window.FB.auth, setUser);
        return () => unsub && unsub();
      }, [ready]);

      useEffect(() => {
        if (!user) return;
        const ref = window.FB.doc(window.FB.db, "artifacts", window.APP_ID, "public", "data", "home", "status");
        const unsubHome = window.FB.onSnapshot(ref, (snap) => { 
            if (snap.exists()) {
               const d = snap.data();
               const gv = (key) => d.fields ? (d.fields[key]?.booleanValue || false) : (d[key] || false);
               setHomeData({ light: gv("light"), kitchen: gv("kitchen"), coffee: gv("coffee"), heater: gv("heater"), fan: gv("fan"), plug: gv("plug") });
            } 
        });
        return () => unsubHome();
      }, [user]);

      const toggleHome = async (field) => {
        if (!user) return;
        const ref = window.FB.doc(window.FB.db, "artifacts", window.APP_ID, "public", "data", "home", "status");
        await window.FB.setDoc(ref, { [field]: !homeData[field] }, { merge: true }).catch(console.error);
      };

      useEffect(() => {
        if(!user) return;
        const interval = setInterval(() => {
           let power = 50; 
           if(homeData.light) power += 40;
           if(homeData.kitchen) power += 60;
           if(homeData.plug) power += 150;
           if(homeData.heater) power += 1200;
           if(homeData.coffee) power += 800;
           if(homeData.fan) power += 80;
           
           power += Math.floor(Math.random() * 20);

           setHomeSim(prev => {
             let temp = prev.temp;
             if (homeData.heater) temp += 0.4;
             else if (homeData.fan) temp -= 0.3;
             else {
               if (temp > 22.5) temp -= 0.1;
               else if (temp < 22.0) temp += 0.1;
             }
             return { power, temp: Math.round(temp * 10) / 10 };
           });
        }, 2000);
        return () => clearInterval(interval);
      }, [user, homeData]);

      function login() {
        if (pin === "0000") {
          setLoggedIn(true);
          setErrorMsg("");
        } else {
          setErrorMsg("Hatalı PIN! Akıllı Ev şifresi: 0000");
        }
      }

      if (!ready) return <div className="min-h-screen flex items-center justify-center px-6"><span className="loader"></span></div>;

      if (!loggedIn) {
        return (
          <div className="min-h-screen flex items-center justify-center px-6 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] bg-slate-50">
            <div className="bg-white w-full max-w-sm rounded-3xl p-8 shadow-2xl relative overflow-hidden border border-slate-200">
              <div className="absolute top-0 left-0 w-full h-2 bg-blue-600"></div>
              <div className="text-center mb-8 mt-4 flex flex-col items-center">
                <div className="mb-3 flex justify-center w-full"><img src="mucitlogo.png" alt="Logo" className="h-32 object-contain" /></div>
                <h1 className="text-center text-4xl font-black tracking-tighter text-slate-900 leading-[1.1]">MUCİT<br/><span className="text-blue-600">AKADEMİSİ</span></h1>
              </div>
              <input type="password" maxLength="4" value={pin} onChange={(e) => setPin(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && login()} placeholder="EV PIN KODU (0000)" className="w-full rounded-xl bg-slate-50 border border-slate-200 px-5 py-4 text-center text-xl tracking-[0.2em] text-slate-900 outline-none focus:border-blue-500 mb-4 font-bold" />
              <button onClick={login} className="w-full rounded-xl bg-blue-600 hover:bg-blue-700 text-white py-4 font-bold uppercase tracking-wider btn-touch shadow-lg shadow-blue-600/20">Giriş Yap</button>
              {errorMsg && <div className="mt-4 p-3 rounded-lg bg-red-50 text-red-500 text-center text-sm font-medium">{errorMsg}</div>}
            </div>
          </div>
        );
      }

      const activeHomeDevices = Object.values(homeData).filter(Boolean).length;

      return (
        <div className="min-h-screen pb-12">
          <header className="px-6 py-5 glass-panel sticky top-0 z-50 flex items-center justify-between shadow-lg">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center text-lg shadow-lg">🏠</div>
              <div>
                <div className="text-lg font-black tracking-tight text-white">AKILLI EV</div>
                <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-green-500"></span> MUCİT AKADEMİSİ</div>
              </div>
            </div>
            <button onClick={() => { setLoggedIn(false); setPin(""); }} className="px-4 py-2 rounded-lg bg-white/5 border border-white/10 text-xs font-bold btn-touch hover:bg-white/10">ÇIKIŞ</button>
          </header>

          <main className="max-w-3xl mx-auto px-4 py-8 animate-[fadeIn_0.3s_ease-out]">
            <HomeVisualizer data={homeData} />

            <div className="grid grid-cols-2 gap-4 mb-6">
              <MetricCard title="Evin Sıcaklığı" value={homeSim.temp} unit="°C" emoji="🌡️" isDanger={homeSim.temp > 28} isWarning={homeSim.temp < 18} />
              <MetricCard title="Çalışan Cihaz" value={activeHomeDevices} unit="Adet" emoji="🔌" isDanger={activeHomeDevices >= 5} isWarning={activeHomeDevices >= 3} />
            </div>

            <div className="glass-panel p-5 rounded-[24px] border border-white/10 shadow-xl">
              <h3 className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4 flex items-center gap-2"><span>📱</span> Ev Aletleri Kontrol Merkezi</h3>
              <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                <ModernWidget title="Salon Işığı" subtitle="Ana Aydınlatma" icon="💡" active={homeData.light} onClick={() => toggleHome("light")} colorClass="bg-amber-500/20 border-amber-500/50 text-amber-200" />
                <ModernWidget title="Mutfak Işığı" subtitle="Tezgah Aydınlatması" icon="🍽️" active={homeData.kitchen} onClick={() => toggleHome("kitchen")} colorClass="bg-blue-500/20 border-blue-500/50 text-blue-200" />
                <ModernWidget title="Kahve Makinesi" subtitle="Mutfak Aletleri" icon="☕" active={homeData.coffee} onClick={() => toggleHome("coffee")} colorClass="bg-orange-500/20 border-orange-500/50 text-orange-200" />
                <ModernWidget title="Isıtıcı" subtitle="Ortam Isıtma" icon="🔥" active={homeData.heater} onClick={() => toggleHome("heater")} colorClass="bg-red-500/20 border-red-500/50 text-red-200" />
                <ModernWidget title="Vantilatör" subtitle="Ortam Soğutma" icon="🌀" active={homeData.fan} onClick={() => toggleHome("fan")} colorClass="bg-cyan-500/20 border-cyan-500/50 text-cyan-200" />
                <ModernWidget title="Akıllı Priz" subtitle="Eğlence / TV" icon="📺" active={homeData.plug} onClick={() => toggleHome("plug")} colorClass="bg-emerald-500/20 border-emerald-500/50 text-emerald-200" />
              </div>
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body> 
</html>
