<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Mucit Akademisi | Akıllı Otopark</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f172a;
      color: white;
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }
    .glass-panel {
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .btn-touch { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
    .btn-touch:active:not(:disabled) { transform: scale(0.96); }
    .loader { width: 20px; height: 20px; border: 3px solid rgba(255, 255, 255, 0.3); border-bottom-color: #fff; border-radius: 50%; display: inline-block; animation: spin 1s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAR1cyO7pFPM5RLvO308uAcSyf5HaqAizM",
      authDomain: "akillisera-b71d4.firebaseapp.com",
      projectId: "akillisera-b71d4",
      storageBucket: "akillisera-b71d4.firebasestorage.app",
      messagingSenderId: "326483167364",
      appId: "1:326483167364:web:77623670ecad58db099ad1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.FB = { auth, db, doc, onSnapshot, setDoc, signInAnonymously, onAuthStateChanged };
    window.APP_ID = "master-iot-final-v3";
    window.firebaseReady = true;
  </script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useState } = React;

    function ParkingVisualizer({ data }) {
      return (
        <div className="mb-6 w-full max-w-[420px] mx-auto animate-[fadeIn_0.5s_ease-out]">
          <div className="text-center mb-2 text-[10px] font-bold text-slate-400 uppercase tracking-widest flex items-center justify-center gap-2">
            <span>👁️</span> Dijital Otopark İkizi (6 Kapasite)
          </div>
          <div className="w-full bg-[#1e293b] rounded-[32px] border-4 border-[#334155] p-4 shadow-xl flex flex-col relative overflow-hidden">
             <div className="flex-1 bg-[#0f172a] rounded-xl border border-white/5 relative grid grid-cols-3 grid-rows-2 h-48 mb-6">
               <div className="absolute top-0 bottom-0 left-1/3 w-px bg-white/10 border-dashed"></div>
               <div className="absolute top-0 bottom-0 left-2/3 w-px bg-white/10 border-dashed"></div>
               <div className="absolute left-0 right-0 top-1/2 h-px bg-white/10 border-dashed"></div>
               {[0, 1, 2, 3, 4, 5].map((slotIdx) => {
                 const isFull = data.slots[slotIdx];
                 return (
                   <div key={slotIdx} className="relative flex items-center justify-center h-full w-full">
                     <div className="absolute top-2 left-2 text-[9px] font-black text-slate-600 tracking-widest">P{slotIdx+1}</div>
                     {isFull ? <div className="text-3xl animate-[fadeIn_0.3s_ease-out]">🚗</div> : <div className="text-3xl font-black text-emerald-500/10 select-none">P</div>}
                   </div>
                 )
               })}
             </div>
             <div className="flex justify-between items-end px-2 gap-6 relative">
               <div className="flex-1 flex flex-col gap-1 relative">
                 <div className="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1">Giriş</div>
                 <div className="w-full h-3 rounded bg-slate-900 border border-white/10 relative overflow-hidden">
                   <div className={`absolute inset-0 transition-all duration-500 ${data.entryGateOpen ? 'bg-emerald-500/30' : 'bg-red-500/50'}`}>
                     {!data.entryGateOpen && <div className="w-full h-full" style={{backgroundImage: 'repeating-linear-gradient(45deg, transparent, transparent 8px, rgba(239,68,68,0.6) 8px, rgba(239,68,68,0.6) 16px)'}}></div>}
                   </div>
                 </div>
               </div>
               <div className="flex-1 flex flex-col gap-1 text-right relative">
                 <div className="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1">Çıkış</div>
                 <div className="w-full h-3 rounded bg-slate-900 border border-white/10 relative overflow-hidden">
                   <div className={`absolute inset-0 transition-all duration-500 ${data.exitGateOpen ? 'bg-emerald-500/30' : 'bg-red-500/50'}`}>
                     {!data.exitGateOpen && <div className="w-full h-full" style={{backgroundImage: 'repeating-linear-gradient(-45deg, transparent, transparent 8px, rgba(239,68,68,0.6) 8px, rgba(239,68,68,0.6) 16px)'}}></div>}
                   </div>
                 </div>
               </div>
             </div>
          </div>
        </div>
      );
    }

    function App() {
      const [ready, setReady] = useState(false);
      const [user, setUser] = useState(null);
      const [pin, setPin] = useState("");
      const [loggedIn, setLoggedIn] = useState(false);
      const [errorMsg, setErrorMsg] = useState("");
      const [isSimulating, setIsSimulating] = useState(false); 

      const [parkData, setParkData] = useState({ occupied: 0, slots: Array(6).fill(false), entryGateOpen: false, exitGateOpen: false });

      useEffect(() => {
        const t = setInterval(() => { if (window.firebaseReady && window.FB) { setReady(true); clearInterval(t); } }, 100);
        return () => clearInterval(t);
      }, []);

      useEffect(() => {
        if (!ready) return;
        window.FB.signInAnonymously(window.FB.auth).catch(e => setErrorMsg("Bağlantı hatası!"));
        const unsub = window.FB.onAuthStateChanged(window.FB.auth, setUser);
        return () => unsub && unsub();
      }, [ready]);

      useEffect(() => {
        if (!user) return;
        const ref = window.FB.doc(window.FB.db, "artifacts", window.APP_ID, "public", "data", "parking", "status");
        const unsubPark = window.FB.onSnapshot(ref, (snap) => {
            if (snap.exists()) {
              const d = snap.data();
              let occupied = 0; let slots = Array(6).fill(false); let entryGateOpen = false; let exitGateOpen = false;

              if (d.occupied !== undefined) {
                occupied = d.occupied;
                if(d.slots && Array.isArray(d.slots)) { for(let i=0; i<d.slots.length && i<6; i++) slots[i] = d.slots[i]; }
                entryGateOpen = d.entryGateOpen || false; exitGateOpen = d.exitGateOpen || false;
              } else if (d.fields) {
                occupied = d.fields.occupied?.integerValue ? Number(d.fields.occupied.integerValue) : 0;
                entryGateOpen = d.fields.entryGateOpen?.booleanValue || false; exitGateOpen = d.fields.exitGateOpen?.booleanValue || false;
                if (d.fields.slots?.arrayValue?.values) {
                  let fSlots = d.fields.slots.arrayValue.values.map(v => v.booleanValue === true);
                  for(let i=0; i<fSlots.length && i<6; i++) slots[i] = fSlots[i];
                }
              }
              setParkData({ occupied, slots, entryGateOpen, exitGateOpen });
            }
        });
        return () => unsubPark();
      }, [user]);

      const togglePark = async (field, value) => {
        if (!user) return;
        const ref = window.FB.doc(window.FB.db, "artifacts", window.APP_ID, "public", "data", "parking", "status");
        await window.FB.setDoc(ref, { [field]: value }, { merge: true }).catch(console.error);
      };

      const simulateParkEntry = async () => {
        if (isSimulating) return;
        if (parkData.occupied >= 6) {
          setErrorMsg("⚠️ İçeride hiç yer yok! Giriş bariyeri açılamaz.");
          setTimeout(() => setErrorMsg(""), 4000);
          return;
        }
        setIsSimulating(true);
        await togglePark("entryGateOpen", true);
        setTimeout(async () => {
          const newSlots = [...parkData.slots];
          const emptyIdx = newSlots.findIndex(s => !s);
          if (emptyIdx !== -1) {
            newSlots[emptyIdx] = true;
            const ref = window.FB.doc(window.FB.db, "artifacts", window.APP_ID, "public", "data", "parking", "status");
            await window.FB.setDoc(ref, { slots: newSlots, occupied: parkData.occupied + 1 }, { merge: true });
          }
          setTimeout(async () => { await togglePark("entryGateOpen", false); setIsSimulating(false); }, 1500);
        }, 1500);
      };

      const simulateParkExit = async () => {
        if (isSimulating) return;
        if (parkData.occupied <= 0) return;
        setIsSimulating(true);
        await togglePark("exitGateOpen", true);
        setTimeout(async () => {
          const newSlots = [...parkData.slots];
          const fullIdx = newSlots.findLastIndex(s => s === true);
          if (fullIdx !== -1) {
            newSlots[fullIdx] = false;
            const ref = window.FB.doc(window.FB.db, "artifacts", window.APP_ID, "public", "data", "parking", "status");
            await window.FB.setDoc(ref, { slots: newSlots, occupied: parkData.occupied - 1 }, { merge: true });
          }
          setTimeout(async () => { await togglePark("exitGateOpen", false); setIsSimulating(false); }, 1500);
        }, 1500);
      };

      const handleManualEntryGateToggle = async () => {
        if (isSimulating) return;
        if (!parkData.entryGateOpen && parkData.occupied >= 6) {
          setErrorMsg("⚠️ İçeride hiç yer yok! Giriş bariyeri açılamaz.");
          setTimeout(() => setErrorMsg(""), 4000);
          return;
        }
        await togglePark("entryGateOpen", !parkData.entryGateOpen);
      };

      const handleManualExitGateToggle = async () => {
        if (isSimulating) return;
        await togglePark("exitGateOpen", !parkData.exitGateOpen);
      };

      function login() {
        if (pin === "2222") {
          setLoggedIn(true);
          setErrorMsg("");
        } else {
          setErrorMsg("Hatalı PIN! Akıllı Otopark şifresi: 2222");
        }
      }

      if (!ready) return <div className="min-h-screen flex items-center justify-center px-6"><span className="loader"></span></div>;

      if (!loggedIn) {
        return (
          <div className="min-h-screen flex items-center justify-center px-6 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] bg-slate-50">
            <div className="bg-white w-full max-w-sm rounded-3xl p-8 shadow-2xl relative overflow-hidden border border-slate-200">
              <div className="absolute top-0 left-0 w-full h-2 bg-blue-600"></div>
              <div className="text-center mb-8 mt-4 flex flex-col items-center">
                <div className="mb-3 flex justify-center w-full"><img src="mucitlogo.png" alt="Logo" className="h-32 object-contain" /></div>
                <h1 className="text-center text-4xl font-black tracking-tighter text-slate-900 leading-[1.1]">MUCİT<br/><span className="text-blue-600">AKADEMİSİ</span></h1>
              </div>
              <input type="password" maxLength="4" value={pin} onChange={(e) => setPin(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && login()} placeholder="OTOPARK PIN (2222)" className="w-full rounded-xl bg-slate-50 border border-slate-200 px-5 py-4 text-center text-xl tracking-[0.2em] text-slate-900 outline-none focus:border-blue-500 mb-4 font-bold" />
              <button onClick={login} className="w-full rounded-xl bg-blue-600 hover:bg-blue-700 text-white py-4 font-bold uppercase tracking-wider btn-touch shadow-lg shadow-blue-600/20">Giriş Yap</button>
              {errorMsg && <div className="mt-4 p-3 rounded-lg bg-red-50 text-red-500 text-center text-sm font-medium">{errorMsg}</div>}
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen pb-12">
          <header className="px-6 py-5 glass-panel sticky top-0 z-50 flex items-center justify-between shadow-lg">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center text-lg shadow-lg">🅿️</div>
              <div>
                <div className="text-lg font-black tracking-tight text-white">AKILLI OTOPARK</div>
                <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-green-500"></span> MUCİT AKADEMİSİ</div>
              </div>
            </div>
            <button onClick={() => { setLoggedIn(false); setPin(""); }} className="px-4 py-2 rounded-lg bg-white/5 border border-white/10 text-xs font-bold btn-touch hover:bg-white/10">ÇIKIŞ</button>
          </header>

          <main className="max-w-3xl mx-auto px-4 py-6 animate-[fadeIn_0.3s_ease-out]">
            <ParkingVisualizer data={parkData} />
            {errorMsg && <div className="max-w-md mx-auto mb-4 p-3 rounded-xl bg-red-500/10 border border-red-500/30 text-red-400 text-center text-sm font-bold shadow-lg animate-[fadeIn_0.2s_ease-out]">{errorMsg}</div>}

            <div className="max-w-md mx-auto glass-panel rounded-[24px] p-5 mb-6 border border-white/5 shadow-xl">
              <h3 className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4 flex items-center justify-center gap-2"><span>🎬</span> Sunum Simülasyonu</h3>
              <div className="flex gap-4">
                <button onClick={simulateParkEntry} disabled={isSimulating} className={`flex-1 bg-indigo-600/20 border border-indigo-500/50 text-indigo-300 p-3 rounded-xl font-bold flex flex-col items-center justify-center gap-1 btn-touch transition-all ${isSimulating ? 'opacity-50 cursor-not-allowed' : 'hover:bg-indigo-600/30'}`}><span className="text-2xl">🚗</span><span className="text-[10px] uppercase tracking-widest">Araç Gönder</span></button>
                <button onClick={simulateParkExit} disabled={isSimulating} className={`flex-1 bg-slate-700/50 border border-slate-600 text-slate-300 p-3 rounded-xl font-bold flex flex-col items-center justify-center gap-1 btn-touch transition-all ${isSimulating ? 'opacity-50 cursor-not-allowed' : 'hover:bg-slate-700'}`}><span className="text-2xl">🚙</span><span className="text-[10px] uppercase tracking-widest">Araç Çıkar</span></button>
              </div>
            </div>

            <div className="max-w-md mx-auto grid grid-cols-2 gap-4 mb-6">
              <button onClick={handleManualEntryGateToggle} disabled={isSimulating} className={`rounded-2xl p-4 flex flex-col items-center justify-center gap-3 border btn-touch transition-all shadow-lg ${parkData.entryGateOpen ? "bg-emerald-900/40 border-emerald-500/50" : "bg-red-900/40 border-red-500/50"} ${isSimulating ? 'opacity-50 cursor-not-allowed' : ''}`}>
                <div className="text-3xl">🚧</div>
                <div className="text-center">
                  <div className={`text-xs font-black uppercase tracking-wider ${parkData.entryGateOpen ? 'text-emerald-400' : 'text-red-400'}`}>Giriş Bariyeri</div>
                  <div className="text-[9px] text-white/50 mt-1">{isSimulating ? "İşlem Bekleniyor..." : parkData.entryGateOpen ? "Açık - Serbest" : "Kapalı - Dur"}</div>
                </div>
                <div className={`w-10 h-5 rounded-full p-1 transition-all ${parkData.entryGateOpen ? "bg-emerald-500" : "bg-red-500"}`}><div className={`w-3 h-3 bg-white rounded-full transition-all ${parkData.entryGateOpen ? "translate-x-5" : "translate-x-0"}`}></div></div>
              </button>
              <button onClick={handleManualExitGateToggle} disabled={isSimulating} className={`rounded-2xl p-4 flex flex-col items-center justify-center gap-3 border btn-touch transition-all shadow-lg ${parkData.exitGateOpen ? "bg-emerald-900/40 border-emerald-500/50" : "bg-red-900/40 border-red-500/50"} ${isSimulating ? 'opacity-50 cursor-not-allowed' : ''}`}>
                <div className="text-3xl">🚧</div>
                <div className="text-center">
                  <div className={`text-xs font-black uppercase tracking-wider ${parkData.exitGateOpen ? 'text-emerald-400' : 'text-red-400'}`}>Çıkış Bariyeri</div>
                  <div className="text-[9px] text-white/50 mt-1">{isSimulating ? "İşlem Bekleniyor..." : parkData.exitGateOpen ? "Açık - Serbest" : "Kapalı - Dur"}</div>
                </div>
                <div className={`w-10 h-5 rounded-full p-1 transition-all ${parkData.exitGateOpen ? "bg-emerald-500" : "bg-red-500"}`}><div className={`w-3 h-3 bg-white rounded-full transition-all ${parkData.exitGateOpen ? "translate-x-5" : "translate-x-0"}`}></div></div>
              </button>
            </div>

            <div className="max-w-md mx-auto glass-panel rounded-[24px] p-6 text-center mb-6 border border-white/5 shadow-xl relative overflow-hidden">
              <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-indigo-500 to-cyan-500"></div>
              <h3 className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4">Anlık Kapasite Durumu</h3>
              <div className="text-6xl mb-2 font-black flex items-center justify-center gap-2">
                <span className={parkData.occupied >= 6 ? "text-red-400" : "text-cyan-400"}>{6 - parkData.occupied}</span>
                <span className="text-slate-600 text-4xl">/</span><span className="text-slate-500 text-5xl">6</span>
              </div>
              <div className="text-[10px] font-bold uppercase tracking-widest text-slate-400">Müsait Park Yeri</div>
            </div>

            <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
              {[0, 1, 2, 3, 4, 5].map((index) => {
                const isFull = parkData.slots[index];
                return (
                  <div key={index} className={`relative rounded-2xl p-6 border flex flex-col items-center justify-center gap-3 transition-colors shadow-lg ${isFull ? "bg-slate-800 border-red-500/30" : "bg-slate-800/50 border-emerald-500/30"}`}>
                    <div className="absolute top-3 left-3 text-xs font-black text-slate-500 opacity-50">P{index + 1}</div>
                    <div className="mt-2 mb-4">
                       {isFull ? <div className="text-5xl animate-[fadeIn_0.4s_ease-out]">🚗</div> : <div className="w-12 h-12 rounded-xl bg-slate-700/50 flex items-center justify-center text-2xl font-black text-slate-800 border border-slate-600/50">P</div>}
                    </div>
                    <div className={`text-[10px] font-bold tracking-widest uppercase px-4 py-1.5 rounded-full border ${isFull ? 'bg-red-500/10 border-red-500/30 text-red-400' : 'bg-emerald-500/10 border-emerald-500/30 text-emerald-400'}`}>
                      {isFull ? "Dolu" : "Boş"}
                    </div>
                  </div>
                );
              })}
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body> 
</html>
